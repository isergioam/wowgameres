name: Sync WoW News

on:
  schedule:
    - cron: '0 */6 * * *' # Cada 6 horas
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
          
      - name: Sync News
        run: node scripts/sync-news.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add src/content/news/latest.json
          # Comprobar si hay cambios reales antes de intentar el commit
          if git diff --staged --quiet; then
            echo "No hay nuevas noticias para sincronizar. Saltando commit."
          else
            git commit -m "docs: sync latest WoW news [skip ci]"
            git push origin main
          fi
