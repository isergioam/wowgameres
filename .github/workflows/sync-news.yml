name: Sync WoW News

on:
  schedule:
    - cron: '0 */6 * * *' # Cada 6 horas
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
          
      - name: Sync News
        run: node scripts/sync-news.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Solo añadir si el archivo existe y ha cambiado
          if [ -f src/content/news/latest.json ]; then
            git add src/content/news/latest.json
            
            if git diff --staged --quiet; then
              echo "No hay nuevas noticias para sincronizar. Saltando commit."
            else
              git commit -m "docs: sync latest WoW news [skip ci]"
              
              # Intentar subir los cambios con rebase para evitar conflictos
              MAX_RETRIES=5
              COUNT=0
              while [ $COUNT -lt $MAX_RETRIES ]; do
                if git pull origin main --rebase && git push origin main; then
                  echo "Cambios subidos correctamente."
                  break
                fi
                COUNT=$((COUNT + 1))
                echo "Error al subir (intento $COUNT/$MAX_RETRIES). Reintentando en 5s..."
                sleep 5
              done
              
              if [ $COUNT -eq $MAX_RETRIES ]; then
                echo "Error persistente al subir cambios."
                exit 1
              fi
            fi
          else
            echo "Error: No se encontró src/content/news/latest.json"
            exit 1
          fi
