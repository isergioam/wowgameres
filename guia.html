<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">Cargando Guía... - WoW | WOWGamerES</title>
  
	<!-- Google Fonts: Inter -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./css/style.css">
  <meta name="description" id="meta-description" content="Guía de nivelación de profesiones en World of Warcraft.">
  <link rel="icon" href="./images/favicon.ico">
  <link rel="preload" href="./header.html" as="fetch" crossorigin>
  <link rel="preload" href="./footer.html" as="fetch" crossorigin>

  <!-- Google Analytics 4 (Placeholder) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZD2R9CWXLH" type="text/plain" data-cookie-consent="analytics"></script>
  <script type="text/plain" data-cookie-consent="analytics">
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZD2R9CWXLH');

<body>

  <div id="wg-header"></div>

  <main class="content">
    <h1 id="guide-h1">Cargando Guía...</h1>

    <!-- Controles Nivelación -->
    <div id="leveling-controls" class="leveling-wrapper-glass section" style="display: none;">
      <div class="glass-header">
        <h2 class="glass-title">Filtro por Nivel de Profesión</h2>
        <div class="glass-badge">Nivel <span id="currentLevelDisplay">1</span></div>
      </div>
      <div class="glass-slider-container">
        <input type="range" id="levelSlider" aria-label="Filtro de nivel" min="1" max="100" value="1" class="glass-slider">
      </div>
    </div>

    <!-- Materiales -->
    <section id="materiales" class="section" style="display: none;">
      <div id="materialsToggle" class="section-toggle">
        <h2 class="section-toggle-title">📦 Materiales necesarios</h2>
        <span id="materialsToggleIcon" class="section-toggle-icon">▼</span>
      </div>
      <div id="materialsContent" class="section-content">
        <table id="materialsTable" style="width: 100%; text-align: left; border-collapse: collapse; margin-top: 10px;">
          <thead>
            <tr style="border-bottom: 2px solid #6a0dad;">
              <th id="sortByName" style="padding: 5px; cursor: pointer; user-select: none;">
                Material <span id="sortIndicatorName" class="sort-indicator">▼</span></th>
              <th id="sortByQty" style="padding: 5px; cursor: pointer; user-select: none;">Cantidad
                <span id="sortIndicatorQty" class="sort-indicator">↕</span>
              </th>
            </tr>
          </thead>
          <tbody id="materialsBody">
            <!-- Dinámico -->
          </tbody>
        </table>
        <p id="guide-note" style="margin-top: 10px; font-size: 0.9em; opacity: 0.8;"></p>
      </div>
    </section>

    <!-- Nivelación (Pasos) -->
    <section id="niveles" class="section" style="display: none;">
      <div id="recipesToggle" class="section-toggle">
        <h2 class="section-toggle-title">📜 Recetas por nivel</h2>
        <span id="recipesToggleIcon" class="section-toggle-icon">▼</span>
      </div>
      <div id="recipesContent" class="section-content">
        <!-- Dinámico -->
      </div>
    </section>
  </main>

  <div id="wg-footer"></div>

  <script src="./js/script.js"></script>
  <script src="./js/guia.js"></script>
</body>

</html>
