<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guía de Sastrería - WotLK WoW</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <div id="wg-header"></div>

  <div class="content">
    <!-- Controles Nivelación Premium -->
    <div id="leveling-controls" class="leveling-wrapper-glass section">
      <div class="glass-header">
        <h2 class="glass-title">Filtro por Nivel de Profesión</h2>
        <div class="glass-badge">Nivel <span id="currentLevelDisplay">1</span></div>
      </div>
      <div class="glass-slider-container">
        <input type="range" id="levelSlider" min="1" max="75" value="1" class="glass-slider">
      </div>
    </div>

    <!-- Materiales -->
    <div id="materiales" class="section">
      <div id="materialsToggle" class="section-toggle">
        <h2 class="section-toggle-title">📦 Materiales necesarios (Restantes)</h2>
        <span id="materialsToggleIcon" class="section-toggle-icon">▼</span>
      </div>
      <div id="materialsContent" class="section-content">
        <table id="materialsTable" style="width: 100%; text-align: left; border-collapse: collapse; margin-top: 10px;">
          <thead>
            <tr style="border-bottom: 2px solid #6a0dad;">
              <th id="sortByName" style="padding: 5px; cursor: pointer; user-select: none;" data-i18n="th_material">
                Material <span id="sortIndicatorName" class="sort-indicator">▼</span></th>
              <th id="sortByQty" style="padding: 5px; cursor: pointer; user-select: none;" data-i18n="th_qty">Cantidad
                <span id="sortIndicatorQty" class="sort-indicator">↕</span>
              </th>
            </tr>
          </thead>
          <tbody id="materialsBody">
            <!-- Insertado Dinamicamente -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Nivelación (Guía paso a paso) -->
    <div id="niveles" class="section">
      <div id="recipesToggle" class="section-toggle">
        <h2 class="section-toggle-title">📜 Recetas por nivel</h2>
        <span id="recipesToggleIcon" class="section-toggle-icon">▼</span>
      </div>
      <div id="recipesContent" class="section-content">

        <p class="custom-step" data-min="1" data-max="20"
          data-mats='{"Tela de tejido de Escarcha": 20}'>
          <strong>Sastrería 1 – 20</strong><br>
          <span class="recipe-name">Venda de tejido de Escarcha &rarr;</span> 20 Tela de tejido de Escarcha.
        </p>

        <p class="custom-step" data-min="20" data-max="75" data-mats='{"Tela de tejido de Escarcha": 180}'>
          <strong>Sastrería 20 – 75</strong><br>
          <span class="recipe-name">Venda de tejido de Escarcha gruesa &rarr;</span> 180 Tela de tejido de Escarcha.
        </p>

      </div>
    </div>
  </div>


  <div id="wg-footer"></div>

  <script src="./js/script.js"></script>
</body>

</html>
